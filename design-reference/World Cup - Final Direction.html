<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Final Direction</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FF2D6B"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="50" y="58" font-family="Arial Black, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="900">26</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx?v=12"></script>
<script type="text/babel" src="wc-shared.jsx?v=12"></script>
<script type="text/babel" src="wc-festival.jsx?v=12"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const F = window.Festival;
const { Confetti, Halo, Floodlights, Pitch, Flag, Chip, Disclaimer, COUNTRY } = window;
const { FT, shade } = F;

/* ── HERO BRIEF ─────────────────────────────────────────────────── */
function Brief() {
  const flagRow = ['TR','BR','FR','AR','JP','EN','DE','MX','MA','ES','NL','KR','US','CA','HR','ZA'];
  return (
    <div style={{ width: 1100, height: 560, position: 'relative', overflow: 'hidden', background: FT.ink, fontFamily: FT.ui }}>
      {/* atmosphere */}
      <Confetti n={80} seed={42} style={{ opacity: .9 }} />
      <Floodlights tint="rgba(255,45,107,.18)" />
      <Pitch color="rgba(255,255,255,.05)" />
      <Halo color="rgba(255,45,107,.26)" x="28%" y="65%" size="55%" />
      <Halo color="rgba(255,122,26,.14)" x="72%" y="30%" size="45%" />

      {/* left content */}
      <div style={{ position: 'absolute', left: 56, top: 50, bottom: 50, width: 500, display: 'flex', flexDirection: 'column', color: '#fff' }}>
        <div style={{ fontFamily: FT.mono, fontSize: 11, letterSpacing: '3px', color: FT.pink }}>
          WORLD CUP 2026 · FAN HUB · ★ FINAL DIRECTION
        </div>
        <div style={{ fontFamily: FT.disp, fontSize: 98, lineHeight: .83, textTransform: 'uppercase', marginTop: 18, letterSpacing: '-1px' }}>
          Bright<br /><span style={{ color: FT.pink }}>Tournament</span><br />Festival
        </div>
        <div style={{ fontSize: 16.5, lineHeight: 1.5, color: 'rgba(255,255,255,.62)', marginTop: 22, maxWidth: 420 }}>
          Fan-made World Cup 2026 poster studio — pick your country, build a 9:16 share card, post it everywhere.
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 'auto', flexWrap: 'wrap' }}>
          {[['48 teams', FT.grass], ['8 templates', FT.sky], ['9:16 poster', FT.tang], ['Instagram · X · WhatsApp', FT.pink]].map(([t, c]) => (
            <Chip key={t} bg="rgba(255,255,255,.1)" color={c} style={{ fontSize: 11, padding: '6px 13px' }}>{t}</Chip>
          ))}
        </div>
        <Disclaimer color="rgba(255,255,255,.28)" style={{ marginTop: 16 }} />
      </div>

      {/* right: flag grid */}
      <div style={{ position: 'absolute', right: 56, top: '50%', transform: 'translateY(-50%)', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
        {flagRow.map((c) => (
          <Flag key={c} code={c} w={58} radius={6} />
        ))}
      </div>
    </div>
  );
}

/* ── SCOPE CARD ─────────────────────────────────────────────────── */
function ScopeCard() {
  const ships = [
    'All 48 national teams',
    'Country Road Poster',
    'Prediction Battle card',
    'Player Watch card',
    'Group Chaos card',
    'Upset Watch card',
    'Matchday Menu card',
    'Golden Boot Debate',
    'Custom Fan Headline',
    'Instagram Story (9:16)',
    'X feed format',
    'WhatsApp share',
  ];
  const out = ['Telegram bot', 'Payment system', 'Premium templates', 'Automatic live data'];
  return (
    <div style={{ width: 660, height: 560, background: FT.paper, fontFamily: FT.ui, color: FT.ink, padding: '40px 44px', display: 'flex', flexDirection: 'column' }}>
      <div style={{ fontFamily: FT.mono, fontSize: 11, letterSpacing: '2.5px', color: FT.pink }}>SCOPE · WHAT SHIPS</div>
      <div style={{ fontFamily: FT.disp, fontSize: 48, lineHeight: .88, textTransform: 'uppercase', marginTop: 12 }}>
        8 templates<br /><span style={{ color: FT.pink }}>48 countries</span>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '7px 20px', marginTop: 22 }}>
        {ships.map((f) => (
          <div key={f} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13.5, fontWeight: 600 }}>
            <span style={{ color: FT.grass, fontFamily: FT.mono, fontSize: 13, fontWeight: 700, lineHeight: 1 }}>✓</span>
            <span style={{ lineHeight: 1.3 }}>{f}</span>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 'auto', borderTop: `1px solid rgba(20,16,12,.1)`, paddingTop: 18 }}>
        <div style={{ fontFamily: FT.mono, fontSize: 10, letterSpacing: '2px', color: 'rgba(20,16,12,.4)', marginBottom: 10 }}>NOT IN THIS VERSION</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {out.map((f) => (
            <span key={f} style={{ fontFamily: FT.mono, fontSize: 11, color: 'rgba(20,16,12,.32)', background: 'rgba(20,16,12,.06)', padding: '5px 11px', borderRadius: 999, textDecoration: 'line-through' }}>{f}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── CARD PREVIEW ROW ───────────────────────────────────────────── */
function CardPreviewRow() {
  const cards = [
    { rot: -5, lift: 10, node: <F.FCardRoad code="TR" w={240} /> },
    { rot: 2, lift: 0,  node: <F.FCardPrediction a="MX" b="ZA" w={240} /> },
    { rot: -2, lift: 14, node: <F.FCardPlayer name="MBAPPÉ" code="FR" number="10" w={240} /> },
    { rot: 5, lift: 4,  node: <F.FCardUpset code="JP" w={240} /> },
    { rot: -3, lift: 8,  node: <F.FCardMenu code="MX" w={240} /> },
  ];
  return (
    <div style={{ width: 1440, height: 480, position: 'relative', overflow: 'hidden', background: FT.paper, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, padding: '20px 40px' }}>
      <Confetti n={30} seed={77} style={{ opacity: .35 }} />
      {cards.map(({ rot, lift, node }, i) => (
        <div key={i} style={{ borderRadius: 18, overflow: 'hidden', boxShadow: '0 28px 56px rgba(20,16,12,.26)', transform: `rotate(${rot}deg) translateY(${lift}px)`, flex: '0 0 auto', position: 'relative', zIndex: 1 }}>
          {node}
        </div>
      ))}
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────────────── */
function App() {
  return (
    <DesignCanvas>

      <DCSection id="direction" title="★ World Cup 2026 — Bright Tournament Festival" subtitle="Final direction · click any board to focus · drag to reorder">
        <DCArtboard id="brief" label="Direction brief" width={1100} height={560}><Brief /></DCArtboard>
        <DCArtboard id="scope" label="Scope · what ships" width={660} height={560}><ScopeCard /></DCArtboard>
        <DCArtboard id="card-preview" label="Share cards · first look" width={1440} height={480}><CardPreviewRow /></DCArtboard>
      </DCSection>

      <DCSection id="screens" title="App screens — white &amp; vivid" subtitle="Desktop homepage · cards page · country hub · mobile">
        <DCArtboard id="s-home" label="Homepage hero" width={1280} height={1010}><F.FestHome /></DCArtboard>
        <DCArtboard id="s-cards" label="Cards · poster studio" width={1280} height={1080}><F.FestCards /></DCArtboard>
        <DCArtboard id="s-country" label="Country hub · Turkey" width={1080} height={1430}><F.FestCountry code="TR" /></DCArtboard>
        <DCArtboard id="s-mobile" label="Mobile · homepage" width={390} height={1290}><F.FestMobile /></DCArtboard>
      </DCSection>

      <DCSection id="cards" title="8 share card templates" subtitle="9:16 · poster format · team colors · confetti everywhere">
        <DCArtboard id="c-road-tr" label="Country Road · Turkey" width={540} height={960}><F.FCardRoad code="TR" w={540} /></DCArtboard>
        <DCArtboard id="c-road-br" label="Country Road · Brazil" width={540} height={960}><F.FCardRoad code="BR" w={540} /></DCArtboard>
        <DCArtboard id="c-pred" label="Prediction Battle · MX vs ZA" width={540} height={960}><F.FCardPrediction a="MX" b="ZA" w={540} /></DCArtboard>
        <DCArtboard id="c-pred2" label="Prediction Battle · FR vs AR" width={540} height={960}><F.FCardPrediction a="FR" b="AR" scoreA={1} scoreB={2} w={540} /></DCArtboard>
        <DCArtboard id="c-player" label="Player Watch · Mbappé" width={540} height={960}><F.FCardPlayer name="MBAPPÉ" code="FR" number="10" w={540} /></DCArtboard>
        <DCArtboard id="c-player2" label="Player Watch · Güler" width={540} height={960}><F.FCardPlayer name="GÜLER" code="TR" number="10" w={540} /></DCArtboard>
        <DCArtboard id="c-upset" label="Upset Watch · Japan" width={540} height={960}><F.FCardUpset code="JP" w={540} /></DCArtboard>
        <DCArtboard id="c-menu" label="Matchday Menu · Mexico" width={540} height={960}><F.FCardMenu code="MX" w={540} /></DCArtboard>
        <DCArtboard id="c-boot" label="Golden Boot Debate" width={540} height={960}><F.FCardBoot code="FR" w={540} /></DCArtboard>
        <DCArtboard id="c-chaos" label="Group Chaos · Brazil" width={540} height={960}><F.FCardChaos code="BR" w={540} /></DCArtboard>
        <DCArtboard id="c-custom-tr" label="Custom Fan Card · Turkey" width={540} height={960}><F.FCardCustom code="TR" headline="BİZ VARUZ" sub="Türkiye · 2026" w={540} /></DCArtboard>
        <DCArtboard id="c-custom-ar" label="Custom Fan Card · Argentina" width={540} height={960}><F.FCardCustom code="AR" headline="WE BELIEVE" sub="Vamos · 2026" w={540} /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
