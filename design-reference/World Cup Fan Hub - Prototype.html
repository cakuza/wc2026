<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 · Fan Hub — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  * { box-sizing: border-box; }
  body { background: radial-gradient(120% 90% at 50% 0%, #2a2622, #161310 60%); overflow: hidden; }
  #root { height: 100vh; display: flex; align-items: center; justify-content: center; }
  input { -webkit-appearance: none; }
  @keyframes wcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wcSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes wcInR { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes wcInL { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes wcToast { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FF2D6B"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="50" y="58" font-family="Arial Black, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="900">26</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>

<script type="text/babel" src="ios-frame.jsx?v=1"></script>
<script type="text/babel" src="wc-shared.jsx?v=8"></script>
<script type="text/babel" src="wc-festival.jsx?v=8"></script>
<script type="text/babel" src="wc-fx.jsx?v=1"></script>
<script type="text/babel" src="wc-cards2.jsx?v=1"></script>
<script type="text/babel" src="wc-app.jsx?v=3"></script>
<script type="text/babel" src="wc-screens.jsx?v=4"></script>
<script type="text/babel" src="wc-studio.jsx?v=6"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { IOSDevice } = window;
const { HomeScreen, PickerScreen, CountryScreen } = window.WCScreens;
const { StudioScreen, ShareSheet } = window.WCStudio;
const { StudioCard } = window.WCApp;
const FT = window.Festival.FT;

const DEFAULT_CFG = { template: 'road', code: 'TR', opp: 'NL', scoreA: 2, scoreB: 1, playerName: 'GÜLER', playerNum: '10', headline: 'WE BELIEVE', sub: 'Vamos · 2026' };

function App() {
  const [stack, setStack] = useState([{ screen: 'home', params: {} }]);
  const [dir, setDir] = useState('fwd');
  const [cfg, setCfg] = useState(DEFAULT_CFG);
  const [ratio, setRatio] = useState('9:16');
  const [theme, setTheme] = useState('color');
  const [pro, setPro] = useState(false);
  const [shareOpen, setShareOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const exportRef = useRef(null);

  const cur = stack[stack.length - 1];

  const go = (screen, params = {}) => {
    if (screen === 'studio') {
      setCfg((p) => {
        const next = { ...p };
        if (params.template) next.template = params.template;
        if (params.code) next.code = params.code;
        if (params.opp) next.opp = params.opp;
        if (next.template === 'player' && params.code) next.playerName = window.playersOf(params.code)[0];
        return next;
      });
    }
    setDir('fwd');
    setStack((s) => [...s, { screen, params }]);
  };
  const back = () => { setDir('back'); setStack((s) => (s.length > 1 ? s.slice(0, -1) : s)); };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1900); };

  let screenEl = null;
  if (cur.screen === 'home') screenEl = <HomeScreen go={go} />;
  else if (cur.screen === 'picker') screenEl = <PickerScreen go={go} back={back} />;
  else if (cur.screen === 'country') screenEl = <CountryScreen code={cur.params.code} go={go} back={back} />;
  else if (cur.screen === 'studio') screenEl = <StudioScreen cfg={cfg} setCfg={setCfg} ratio={ratio} setRatio={setRatio} theme={theme} setTheme={setTheme} pro={pro} setPro={setPro} go={go} back={back} onShare={() => setShareOpen(true)} exportRef={exportRef} />;

  // fit-to-viewport scaler
  const wrapRef = useRef(null);
  useEffect(() => {
    const fit = () => {
      if (!wrapRef.current) return;
      const s = Math.min(window.innerWidth / 402, window.innerHeight / 874) * 0.96;
      wrapRef.current.style.transform = `scale(${Math.min(s, 1.1)})`;
    };
    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div ref={wrapRef} style={{ transformOrigin: 'center center' }}>
      <IOSDevice>
        <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
          <div key={stack.length + cur.screen} style={{ height: '100%', animation: `${dir === 'fwd' ? 'wcInR' : 'wcInL'} .26s ease` }}>
            {screenEl}
          </div>
          {shareOpen && <ShareSheet cfg={cfg} ratio={ratio} theme={theme} pro={pro} onClose={() => setShareOpen(false)} onToast={showToast} exportRef={exportRef} />}
          {toast && (
            <div style={{ position: 'absolute', left: '50%', bottom: 54, transform: 'translateX(-50%)', zIndex: 120, background: FT.ink, color: '#fff', fontFamily: FT.ui, fontWeight: 700, fontSize: 14, padding: '12px 20px', borderRadius: 999, boxShadow: '0 12px 30px rgba(0,0,0,.3)', animation: 'wcToast .22s ease', whiteSpace: 'nowrap' }}>{toast}</div>
          )}
        </div>
      </IOSDevice>
      {/* offscreen full-res card for PNG export — matches active ratio/theme/pro */}
      <div style={{ position: 'fixed', left: -99999, top: 0, pointerEvents: 'none' }}>
        <div ref={exportRef}><StudioCard cfg={cfg} w={ratio === '16:9' ? 960 : 540} ratio={ratio} theme={theme} pro={pro} /></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
