<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 · Fan Hub — Visual Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  .wc-intro { font-family: Archivo, sans-serif; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FF2D6B"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="50" y="58" font-family="Arial Black, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="900">26</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx?v=7"></script>
<script type="text/babel" src="wc-shared.jsx?v=7"></script>
<script type="text/babel" src="wc-festival.jsx?v=7"></script>
<script type="text/babel" src="wc-night.jsx?v=7"></script>
<script type="text/babel" src="wc-poster.jsx?v=7"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
const F = window.Festival;
const N = window.Night;
const P = window.Poster;

function Intro() {
  return (
    <div style={{ width: 760, background: '#14100C', color: '#fff', padding: '48px 52px', fontFamily: 'Archivo, sans-serif' }}>
      <div style={{ fontFamily: '"Space Mono", monospace', fontSize: 12, letterSpacing: '3px', color: '#FF2D6B' }}>WORLD CUP 2026 · FAN HUB</div>
      <div style={{ fontFamily: 'Anton, sans-serif', fontSize: 64, lineHeight: .9, textTransform: 'uppercase', marginTop: 16 }}>Three visual<br />directions</div>
      <div style={{ fontSize: 17, lineHeight: 1.55, color: 'rgba(255,255,255,.7)', marginTop: 20, maxWidth: 560 }}>
        A redesign of the fan hub & card studio — away from the dev-dashboard look, toward a viral, share-native matchday poster product. Each direction shows a homepage hero, the cards page, sample share cards and a mobile view.
      </div>
      <div style={{ display: 'flex', gap: 12, marginTop: 28, flexWrap: 'wrap' }}>
        {[['01 · Bright Tournament Festival', '#FF2D6B', 'Recommended'], ['02 · Premium Stadium Night', '#C9A227', ''], ['03 · Bold Fan-Page Poster', '#06D6A0', '']].map(([t, c, tag]) => (
          <div key={t} style={{ background: 'rgba(255,255,255,.06)', borderRadius: 14, padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: c }} />
            <span style={{ fontWeight: 800, fontSize: 15 }}>{t}</span>
            {tag && <span style={{ fontFamily: '"Space Mono", monospace', fontSize: 10, color: '#14100C', background: c, padding: '3px 8px', borderRadius: 999, fontWeight: 700 }}>{tag}</span>}
          </div>
        ))}
      </div>
      <div style={{ fontFamily: '"Space Mono", monospace', fontSize: 10.5, color: 'rgba(255,255,255,.45)', marginTop: 30 }}>FAN-MADE · NOT AFFILIATED WITH FIFA OR ANY OFFICIAL TOURNAMENT ORGANIZER · NO LOGOS, CRESTS, PHOTOS OR OFFICIAL KITS USED</div>
    </div>
  );
}

function Recommend() {
  const row = (t, body, tone) => (
    <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start', padding: '16px 0', borderTop: '1px solid rgba(255,255,255,.1)' }}>
      <span style={{ width: 10, height: 10, borderRadius: 3, background: tone, marginTop: 6, flex: '0 0 auto' }}></span>
      <div>
        <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4 }}>{t}</div>
        <div style={{ fontSize: 14.5, lineHeight: 1.5, color: 'rgba(255,255,255,.7)' }}>{body}</div>
      </div>
    </div>
  );
  return (
    <div style={{ width: 760, background: '#14100C', color: '#fff', padding: '44px 52px', fontFamily: 'Archivo, sans-serif' }}>
      <div style={{ fontFamily: '"Space Mono", monospace', fontSize: 12, letterSpacing: '3px', color: '#06D6A0' }}>MY RECOMMENDATION</div>
      <div style={{ fontFamily: 'Anton, sans-serif', fontSize: 52, lineHeight: .92, textTransform: 'uppercase', marginTop: 14 }}>Ship <span style={{ color: '#FF2D6B' }}>Bright Tournament Festival</span></div>
      <div style={{ fontSize: 16.5, lineHeight: 1.55, color: 'rgba(255,255,255,.72)', marginTop: 16 }}>
        For a viral, money-making fan-card product, Festival wins. It photographs best in a feed, the white canvas makes country colors pop on every share, and the celebratory tone matches how fans actually post. Here's the reasoning:
      </div>
      <div style={{ marginTop: 18 }}>
        {row('Festival = most shareable', 'Bright cards stand out in Instagram/X/WhatsApp feeds that are mostly white UI. Color-blocked country fields read instantly at thumbnail size — critical for virality.', '#FF2D6B')}
        {row('Night = premium, but heavy', 'Cinematic and gorgeous for hero moments, but dark posters can feel like every other "epic" sports edit and lose punch as a 1:1 thumbnail. Best kept as an optional card theme.', '#C9A227')}
        {row('Poster = loud, but polarizing', 'Maximum stop-scroll energy and the strongest meme/fan-page DNA — but the sticker-collage look ages fast and is harder to keep on-brand across 48 countries.', '#06D6A0')}
      </div>
      <div style={{ marginTop: 22, background: 'rgba(255,45,107,.12)', border: '1px solid rgba(255,45,107,.35)', borderRadius: 14, padding: '16px 18px' }}>
        <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 6 }}>The play →</div>
        <div style={{ fontSize: 14.5, lineHeight: 1.5, color: 'rgba(255,255,255,.8)' }}>Build on Festival. Offer <b>Night</b> and <b>Poster</b> as one-tap card themes inside the studio — same data, three vibes. Fans pick the mood that matches their post; you triple the output from one engine.</div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="World Cup 2026 — Fan Hub redesign" subtitle="Pick a direction · drag to reorder · click any board to focus">
        <DCArtboard id="brief" label="Brief" width={760} height={470}><Intro /></DCArtboard>
        <DCArtboard id="rec" label="Recommendation" width={760} height={720}><Recommend /></DCArtboard>
      </DCSection>

      <DCSection id="festival" title="01 · Bright Tournament Festival ★ Recommended" subtitle="White & vivid · confetti · color-blocked · celebratory">
        <DCArtboard id="f-home" label="Homepage hero" width={1280} height={1010}><F.FestHome /></DCArtboard>
        <DCArtboard id="f-cards" label="Cards page (money page)" width={1280} height={1080}><F.FestCards /></DCArtboard>
        <DCArtboard id="f-country" label="Country hub · Turkey" width={1080} height={1430}><F.FestCountry code="TR" /></DCArtboard>
        <DCArtboard id="f-mobile" label="Mobile · homepage" width={390} height={1290}><F.FestMobile /></DCArtboard>
        <DCArtboard id="f-card-road" label="Card · Country Road" width={540} height={960}><F.FCardRoad code="TR" /></DCArtboard>
        <DCArtboard id="f-card-pred" label="Card · Prediction Battle" width={540} height={960}><F.FCardPrediction a="MX" b="ZA" /></DCArtboard>
        <DCArtboard id="f-card-player" label="Card · Player Watch" width={540} height={960}><F.FCardPlayer code="FR" number="10" /></DCArtboard>
      </DCSection>

      <DCSection id="night" title="02 · Premium Stadium Night" subtitle="Deep navy-black · floodlights · gold foil · cinematic">
        <DCArtboard id="n-home" label="Homepage hero" width={1280} height={980}><N.NightHome /></DCArtboard>
        <DCArtboard id="n-cards" label="Cards page" width={1280} height={1060}><N.NightCards /></DCArtboard>
        <DCArtboard id="n-mobile" label="Mobile · homepage" width={390} height={1240}><N.NightMobile /></DCArtboard>
        <DCArtboard id="n-card-road" label="Card · Country Road" width={540} height={960}><N.NCardRoad code="TR" /></DCArtboard>
        <DCArtboard id="n-card-menu" label="Card · Matchday Menu" width={540} height={960}><N.NCardMenu /></DCArtboard>
        <DCArtboard id="n-card-boot" label="Card · Golden Boot Debate" width={540} height={960}><N.NCardBoot /></DCArtboard>
      </DCSection>

      <DCSection id="poster" title="03 · Bold Fan-Page Poster" subtitle="High-contrast · huge type · stickers · collage energy">
        <DCArtboard id="p-home" label="Homepage hero" width={1280} height={980}><P.PosterHome /></DCArtboard>
        <DCArtboard id="p-cards" label="Cards page" width={1280} height={1060}><P.PosterCards /></DCArtboard>
        <DCArtboard id="p-mobile" label="Mobile · homepage" width={390} height={1320}><P.PosterMobile /></DCArtboard>
        <DCArtboard id="p-card-chaos" label="Card · Group Chaos" width={540} height={960}><P.PCardChaos /></DCArtboard>
        <DCArtboard id="p-card-upset" label="Card · Upset Watch" width={540} height={960}><P.PCardUpset code="JP" /></DCArtboard>
        <DCArtboard id="p-card-player" label="Card · Player Watch" width={540} height={960}><P.PCardPlayer /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
