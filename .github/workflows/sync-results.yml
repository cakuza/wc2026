name: Sync WC results

# Pulls FIFA World Cup 2026 results + standings from football-data.org and commits any
# changes to data/*.json. Cron only fires in June/July; a date-window guard keeps it to the
# actual tournament dates (2026-06-11 .. 2026-07-19). Also runnable manually.
on:
  schedule:
    - cron: "*/15 * * 6,7 *" # every 15 minutes, June & July (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Tournament window guard
        id: window
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          START="2026-06-11"
          END="2026-07-19"
          if [[ "$TODAY" < "$START" || "$TODAY" > "$END" ]]; then
            echo "Outside tournament window ($TODAY) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync script
        if: steps.window.outputs.run == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/sync-results.mjs

      - name: Commit & push if data changed
        if: steps.window.outputs.run == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "bot@wc2026.local"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore(data): sync WC results & standings [skip ci]"
            git push
          else
            echo "No data changes to commit."
          fi
